services:
  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE to a pinned backend tag}
    restart: unless-stopped
    environment:
      RAILS_ENV: production
      PORT: 9090
      BINDING: 0.0.0.0
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Set SECRET_KEY_BASE in Portainer}
    ports:
      - "${BACKEND_BIND_ADDRESS:-127.0.0.1}:${BACKEND_HOST_PORT:-19101}:9090"
    volumes:
      - backend_storage_staging:/rails/storage
    networks:
      - staging_net

  frontend:
    image: ${FRONTEND_IMAGE:?Set FRONTEND_IMAGE to a pinned frontend tag}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_BIND_ADDRESS:-127.0.0.1}:${FRONTEND_HOST_PORT:-19100}:80"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O - http://localhost/__frontend_health >/dev/null 2>&1 || wget -q -O - http://localhost/health >/dev/null 2>&1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - staging_net

  landing:
    image: ${LANDING_IMAGE:-ghcr.io/aldervon-systems/vendingbackpack/landing:latest}
    restart: unless-stopped
    ports:
      - "${LANDING_BIND_ADDRESS:-127.0.0.1}:${LANDING_HOST_PORT:-19060}:80"
    networks:
      - staging_net

  rdfm-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rdfm
      POSTGRES_PASSWORD: ${RDFM_DB_PASSWORD:?Set RDFM_DB_PASSWORD in Portainer}
      POSTGRES_DB: rdfm
    volumes:
      - rdfm_db_data_staging:/var/lib/postgresql/data
    networks:
      - staging_net

  rdfm-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - staging_net

  rdfm-server:
    image: ${RDFM_SERVER_IMAGE:-ghcr.io/aldervon-systems/rdfm-server:latest}
    restart: unless-stopped
    depends_on:
      - rdfm-db
      - rdfm-redis
    environment:
      RDFM_JWT_SECRET: ${RDFM_JWT_SECRET:?Set RDFM_JWT_SECRET in Portainer}
      RDFM_DB_CONNSTRING: postgresql://rdfm:${RDFM_DB_PASSWORD}@rdfm-db:5432/rdfm
      RDFM_HOSTNAME: 0.0.0.0
      RDFM_API_PORT: 5000
      RDFM_LOCAL_PACKAGE_DIR: /packages
      RDFM_WSGI_SERVER: gunicorn
      RDFM_FRONTEND_APP_URL: ${RDFM_FRONTEND_APP_URL:-https://staging.aldervon.com/device}
      REDIS_HOST: rdfm-redis
      REDIS_PORT: 6379
      RDFM_DISABLE_ENCRYPTION: 1
      RDFM_OAUTH_URL: ${RDFM_OAUTH_URL:-https://keycloak.aldervon.com/keycloak/realms/master/protocol/openid-connect/token/introspect}
      RDFM_OAUTH_CLIENT_ID: ${RDFM_OAUTH_CLIENT_ID:-rdfm-server-introspection}
      RDFM_OAUTH_CLIENT_SEC: ${RDFM_OAUTH_CLIENT_SEC:?Set RDFM_OAUTH_CLIENT_SEC in Portainer}
    ports:
      - "${RDFM_BIND_ADDRESS:-127.0.0.1}:${RDFM_HOST_PORT:-15010}:5000"
    volumes:
      - rdfm_packages_staging:/packages
    networks:
      - staging_net

networks:
  staging_net:
    name: aldervon-stack_default
    external: true

volumes:
  backend_storage_staging:
    name: ${BACKEND_STORAGE_VOLUME:-backend_storage_staging}
  rdfm_db_data_staging:
    name: ${RDFM_DB_VOLUME:-rdfm_db_data_staging}
  rdfm_packages_staging:
    name: ${RDFM_PACKAGES_VOLUME:-rdfm_packages_staging}
