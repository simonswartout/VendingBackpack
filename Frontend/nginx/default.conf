server {
    listen 80;
    server_name localhost;
    resolver 127.0.0.11 valid=30s;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 1. THE ENTRY POINT (index.html)
    # NEVER cache this. If this caches, users won't see updates.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # 2. STATIC ASSETS (JS, CSS, WASM, Images)
    # Cache these aggressively IF they have hashes in filenames.
    # If they don't have hashes, use "no-cache" or a very short max-age.
    location ~* \.(js|css|wasm|bin|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        add_header Cache-Control "no-cache, public, immutable";
    }

    # 3. SERVICE WORKER
    # NEVER cache the service worker itself.
    location = /service-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # 4. API PROXY
    location /api/ {
        set $backend_upstream "http://backend:9090";
        proxy_intercept_errors on;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 5. HEALTH PROXY (maps /health to backend /health)
    location /health {
        set $backend_upstream "http://backend:9090";
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
    }
}